services:
  gala-planner:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3001}"
      MAX_FILE_SIZE: "${MAX_FILE_SIZE:-10485760}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
