name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Verify build
        run: npm run build

      - name: Package build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          tar -czf "release-artifacts/source-${GITHUB_REF_NAME}.tar.gz" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='release-artifacts' \
            .
          tar -czf "release-artifacts/frontend-dist-${GITHUB_REF_NAME}.tar.gz" -C packages/frontend dist
          tar -czf "release-artifacts/backend-dist-${GITHUB_REF_NAME}.tar.gz" -C packages/backend dist
          tar -czf "release-artifacts/shared-dist-${GITHUB_REF_NAME}.tar.gz" -C packages/shared dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*.tar.gz
